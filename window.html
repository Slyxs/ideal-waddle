<div id="live2d_plus_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Live2D+</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- ── Global ─────────────────────────────────────────────── -->
            <div class="l2dplus-section-header">Global</div>

            <label class="checkbox_label" title="Show the Live2D model overlay">
                <input type="checkbox" id="l2dplus_enabled">
                <span>Enable Live2D</span>
            </label>
            <label class="checkbox_label" title="Model eyes follow the mouse cursor">
                <input type="checkbox" id="l2dplus_follow_cursor">
                <span>Follow Cursor</span>
            </label>
            <label class="checkbox_label" title="Drag the model to reposition it">
                <input type="checkbox" id="l2dplus_draggable">
                <span>Enable Dragging</span>
            </label>

            <!-- ── Model ──────────────────────────────────────────────── -->
            <div class="l2dplus-section-header">Model</div>

            <div class="l2dplus-row">
                <label>
                    <span>Source</span>
                </label>
                <select id="l2dplus_model_source" class="text_pole">
                    <option value="default">Default (Shizuku demo)</option>
                    <option value="url">URL</option>
                    <option value="local">Local Path</option>
                </select>
            </div>

            <div id="l2dplus_url_row" class="l2dplus-row" style="display:none">
                <label><span>Model URL</span></label>
                <input type="text" id="l2dplus_custom_url" class="text_pole"
                    placeholder="https://example.com/model.model3.json">
            </div>

            <div id="l2dplus_local_row" class="l2dplus-row" style="display:none">
                <label><span>Local Path</span></label>
                <input type="text" id="l2dplus_local_path" class="text_pole"
                    placeholder="/scripts/extensions/third-party/Extension-Live2D+/assets/model.json">
                <small style="opacity:0.5;font-size:0.78em">
                    Relative to SillyTavern root (must be under public/).
                </small>
            </div>

            <div style="display:flex;gap:6px;margin-top:4px">
                <div id="l2dplus_reload_btn" class="menu_button menu_button_icon" title="Reload model from current source">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Reload Model</span>
                </div>
            </div>

            <div id="l2dplus_model_status" class="l2dplus-status">No model loaded.</div>

            <!-- ── Rendering ──────────────────────────────────────────── -->
            <div class="l2dplus-section-header">Rendering</div>

            <div class="l2dplus-row">
                <label>
                    <span>Canvas Width</span>
                    <span><span id="l2dplus_canvas_width_val">800</span> px</span>
                </label>
                <input type="range" id="l2dplus_canvas_width" min="200" max="1600" step="50" value="800">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Canvas Height</span>
                    <span><span id="l2dplus_canvas_height_val">800</span> px</span>
                </label>
                <input type="range" id="l2dplus_canvas_height" min="200" max="1600" step="50" value="800">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Model Scale</span>
                    <span id="l2dplus_scale_val">0.40</span>
                </label>
                <input type="range" id="l2dplus_scale" min="0.05" max="3.00" step="0.05" value="0.4">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Position X (% of screen)</span>
                    <span id="l2dplus_pos_x_val">80</span>
                </label>
                <input type="range" id="l2dplus_pos_x" min="0" max="100" step="1" value="80">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Position Y (% of screen)</span>
                    <span id="l2dplus_pos_y_val">60</span>
                </label>
                <input type="range" id="l2dplus_pos_y" min="0" max="100" step="1" value="60">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Model Anchor X (% of canvas)</span>
                    <span id="l2dplus_model_offset_x_val">50</span>
                </label>
                <input type="range" id="l2dplus_model_offset_x" min="0" max="100" step="1" value="50">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Model Anchor Y (% of canvas)</span>
                    <span id="l2dplus_model_offset_y_val">50</span>
                </label>
                <input type="range" id="l2dplus_model_offset_y" min="0" max="100" step="1" value="50">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Opacity</span>
                    <span id="l2dplus_opacity_val">1.00</span>
                </label>
                <input type="range" id="l2dplus_opacity" min="0.05" max="1.00" step="0.05" value="1.0">
            </div>

            <div class="l2dplus-row">
                <label>
                    <span>Z-Index</span>
                    <span id="l2dplus_zindex_val">35</span>
                </label>
                <input type="range" id="l2dplus_zindex" min="1" max="9999" step="1" value="35">
            </div>

            <!-- ── Filters ────────────────────────────────────────────── -->
            <div class="l2dplus-section-header">Filters</div>

            <!-- Outline -->
            <div class="l2dplus-filter-block">
                <div class="l2dplus-filter-header">
                    <input type="checkbox" id="l2dplus_filter_outline">
                    <label for="l2dplus_filter_outline" style="cursor:pointer;margin:0">Outline</label>
                </div>
                <div id="l2dplus_outline_params" class="l2dplus-filter-params">
                    <div class="l2dplus-row">
                        <label>
                            <span>Thickness</span>
                            <span id="l2dplus_outline_thickness_val">2</span>
                        </label>
                        <input type="range" id="l2dplus_outline_thickness" min="1" max="20" step="1" value="2">
                    </div>
                    <div class="l2dplus-color-row">
                        <label for="l2dplus_outline_color">Color</label>
                        <input type="color" id="l2dplus_outline_color" value="#805ad5">
                    </div>
                </div>
            </div>

            <!-- Pixelate -->
            <div class="l2dplus-filter-block">
                <div class="l2dplus-filter-header">
                    <input type="checkbox" id="l2dplus_filter_pixelate">
                    <label for="l2dplus_filter_pixelate" style="cursor:pointer;margin:0">Pixelate</label>
                </div>
                <div id="l2dplus_pixelate_params" class="l2dplus-filter-params">
                    <div class="l2dplus-row">
                        <label>
                            <span>Pixel Size</span>
                            <span id="l2dplus_pixelate_size_val">5</span>
                        </label>
                        <input type="range" id="l2dplus_pixelate_size" min="2" max="32" step="1" value="5">
                    </div>
                </div>
            </div>

            <!-- CRT -->
            <div class="l2dplus-filter-block">
                <div class="l2dplus-filter-header">
                    <input type="checkbox" id="l2dplus_filter_crt">
                    <label for="l2dplus_filter_crt" style="cursor:pointer;margin:0">CRT</label>
                </div>
                <div id="l2dplus_crt_params" class="l2dplus-filter-params">
                    <div class="l2dplus-row">
                        <label>
                            <span>Curvature</span>
                            <span id="l2dplus_crt_curvature_val">3</span>
                        </label>
                        <input type="range" id="l2dplus_crt_curvature" min="0" max="10" step="0.5" value="3">
                    </div>
                    <div class="l2dplus-row">
                        <label>
                            <span>Noise</span>
                            <span id="l2dplus_crt_noise_val">0.10</span>
                        </label>
                        <input type="range" id="l2dplus_crt_noise" min="0" max="1" step="0.05" value="0.1">
                    </div>
                    <div class="l2dplus-row">
                        <label>
                            <span>Vignetting</span>
                            <span id="l2dplus_crt_vignetting_val">0.30</span>
                        </label>
                        <input type="range" id="l2dplus_crt_vignetting" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
            </div>

            <!-- Noise -->
            <div class="l2dplus-filter-block">
                <div class="l2dplus-filter-header">
                    <input type="checkbox" id="l2dplus_filter_noise">
                    <label for="l2dplus_filter_noise" style="cursor:pointer;margin:0">Noise</label>
                </div>
                <div id="l2dplus_noise_params" class="l2dplus-filter-params">
                    <div class="l2dplus-row">
                        <label>
                            <span>Noise Level</span>
                            <span id="l2dplus_noise_level_val">0.20</span>
                        </label>
                        <input type="range" id="l2dplus_noise_level" min="0" max="1" step="0.05" value="0.2">
                    </div>
                </div>
            </div>

            <!-- Alpha -->
            <div class="l2dplus-filter-block">
                <div class="l2dplus-filter-header">
                    <input type="checkbox" id="l2dplus_filter_alpha">
                    <label for="l2dplus_filter_alpha" style="cursor:pointer;margin:0">Alpha (Global Transparency)</label>
                </div>
                <div id="l2dplus_alpha_params" class="l2dplus-filter-params">
                    <div class="l2dplus-row">
                        <label>
                            <span>Alpha</span>
                            <span id="l2dplus_alpha_val">0.80</span>
                        </label>
                        <input type="range" id="l2dplus_alpha_filter" min="0.05" max="1.00" step="0.05" value="0.8">
                    </div>
                </div>
            </div>

            <!-- ── Motion & Expression Test ───────────────────────────── -->
            <div class="l2dplus-section-header">Motion &amp; Expression Test</div>

            <div class="l2dplus-test-grid">
                <div class="l2dplus-test-col">
                    <label>Motion Group</label>
                    <select id="l2dplus_test_motion_group" class="text_pole">
                        <option value="">-- No groups loaded --</option>
                    </select>
                    <label>Motion</label>
                    <select id="l2dplus_test_motion_index" class="text_pole">
                        <option value="">-- Select group first --</option>
                    </select>
                    <div id="l2dplus_test_play_motion" class="menu_button l2dplus-play-btn">
                        <i class="fa-solid fa-play"></i> Play Motion
                    </div>
                </div>
                <div class="l2dplus-test-col">
                    <label>Expression</label>
                    <select id="l2dplus_test_expression" class="text_pole">
                        <option value="">-- No expressions loaded --</option>
                    </select>
                    <div id="l2dplus_test_play_expression" class="menu_button l2dplus-play-btn" style="margin-top:auto">
                        <i class="fa-solid fa-play"></i> Play Expression
                    </div>
                </div>
            </div>

            <div id="l2dplus_test_status" class="l2dplus-status"></div>

        </div><!-- /.inline-drawer-content -->
    </div><!-- /.inline-drawer -->
</div><!-- /#live2d_plus_settings -->
